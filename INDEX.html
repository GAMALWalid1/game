<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Holy Journey | المنصة الشاملة - نسخة مارتينا النهائية</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #ffcc00; 
            --blue: #00d2ff; 
            --glass: rgba(10, 15, 20, 0.9);
            --neon-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Cairo', sans-serif; background: #050505; color: white; overflow: hidden; }
        #map { position: absolute; width: 100%; height: 100%; z-index: 1; filter: brightness(0.7) contrast(1.1); }

        /* الهيدر العلوي */
        .header-container {
            position: absolute; top: 20px; left: 20px; right: 20px;
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        }

        .nav-apps { display: flex; flex-wrap: wrap; gap: 12px; }
        
        .live-clock-box {
            background: var(--glass); padding: 10px 20px; border-radius: 15px;
            border: 1px solid var(--gold); color: #fff; font-weight: 900; font-size: 1.2rem;
            backdrop-filter: blur(10px); display: flex; align-items: center; gap: 10px;
            box-shadow: var(--neon-shadow);
        }

        .app-link { 
            padding: 12px 20px; background: var(--glass); border-radius: 15px; 
            color: var(--gold); text-decoration: none; border: 1px solid rgba(255,204,0,0.3); 
            font-size: 0.85rem; transition: 0.4s; display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(12px); box-shadow: var(--neon-shadow);
        }
        .app-link:hover { background: var(--gold); color: #000; transform: translateY(-5px); }

        .tourist-panel {
            position: absolute; top: 100px; right: 20px; width: 340px; max-height: 75vh; overflow-y: auto;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 25px; padding: 25px; z-index: 1000;
            border: 1px solid rgba(255,204,0,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .search-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--gold); font-weight: 700; }
        input, select {
            width: 100%; padding: 10px; background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; font-family: 'Cairo'; outline: none; box-sizing: border-box;
        }

        .btn-find {
            width: 100%; padding: 14px; background: var(--gold); border: none;
            border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; margin-top: 10px;
        }

        .distance-info {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--glass); padding: 15px 35px;
            border-radius: 50px; z-index: 1000; border: 1px solid var(--blue);
            font-size: 0.9rem; display: flex; gap: 20px; backdrop-filter: blur(10px);
        }

        .map-icon-container {
            display: flex; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); border-radius: 50%;
            width: 35px; height: 35px; border: 2px solid var(--gold);
        }

        .popup-card { text-align: right; direction: rtl; min-width: 260px; font-family: 'Cairo'; color: #333; }
        .popup-img { width: 100%; height: 130px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--gold); }
        
        .ai-voice-btn { width: 100%; padding: 10px; background: #222; color: var(--gold); border: 1px solid var(--gold); border-radius: 8px; cursor: pointer; font-family: 'Cairo'; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .checkin-btn { width: 100%; margin-top: 10px; padding: 12px; background: var(--blue); border: none; border-radius: 8px; color: #000; font-weight: 900; cursor: pointer; font-family: 'Cairo'; }
        .checkin-btn:disabled { background: #28a745 !important; color: white !important; }

        .lang-tabs { display: flex; gap: 4px; margin: 10px 0; }
        .tab-btn { flex: 1; padding: 5px; font-size: 10px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: #000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="nav-apps">
            <a href="https://arcg.is/ua0zX0" target="_blank" class="app-link"><i class="fas fa-book-open"></i> قِصَّةُ الْمَسَارِ</a>
            <a href="https://experience.arcgis.com/experience/d6096606cee94d4697b71febe2216d28" target="_blank" class="app-link"><i class="fas fa-vr-cardboard"></i> تَجْرِبَةُ VR 360°</a>
            <a href="https://www.arcgis.com/apps/dashboards/7e8628d3a62d42b79fa0f26060d8d60a" target="_blank" class="app-link"><i class="fas fa-map-marked-alt"></i> دَاشْبُوردُ السَّائِحِ</a>
            <a href="https://www.arcgis.com/apps/dashboards/6203b56b6ccd43cf8f590f31b6e96c86" target="_blank" class="app-link"><i class="fas fa-chart-line"></i> لَوْحَةُ الْإِدَارَةِ</a>
        </div>

        <div class="live-clock-box">
            <i class="fas fa-clock" style="color:var(--gold)"></i> <span id="clock-txt">00:00:00 م</span>
        </div>
    </div>

    <div class="tourist-panel">
        <h2 style="margin-top:0; color: var(--gold); font-size: 1.3rem;"><i class="fas fa-route"></i> مُخَطَّطُ الرِّحْلَةِ الذَّكِيُّ</h2>
        <div class="search-group">
            <label><i class="fas fa-clock"></i> وَقْتُ الِانْطِلَاقِ:</label>
            <input type="time" id="start-time" value="08:00">
        </div>
        <div class="search-group">
            <label><i class="fas fa-wallet"></i> الْمِيزَانِيَّةُ (جُنَيْه):</label>
            <input type="number" id="budget" placeholder="مِثْلًا: 1000">
        </div>
        <div class="search-group">
            <label><i class="fas fa-heart"></i> نَوْعُ الْمَحَطَّاتِ:</label>
            <select id="type">
                <option value="روحاني">رُوحَانِيٌّ (كَنَائِسُ وَأَدْيِرَةٌ)</option>
                <option value="أثري">أَثَرِيٌّ (تِلَالٌ وَمَعَالِمُ)</option>
                <option value="تاريخي">تَارِيخِيٌّ (مُدُنٌ قَدِيمَةٌ)</option>
            </select>
        </div>
        <button class="btn-find" onclick="planMyTrip()">إِنْشَاءُ مَسَارِ الرِّحْلَةِ</button>
        <div id="result-card" style="margin-top:15px; display:none; background:rgba(0, 210, 255, 0.1); padding:15px; border-radius:15px; border-right: 5px solid var(--blue);">
            <div id="route-summary" style="font-size:0.9rem; color:var(--gold);"></div>
            <div id="itinerary-list" style="font-size:0.8rem; margin-top:5px;"></div>
        </div>
    </div>

    <div class="distance-info">
        <span><i class="fas fa-road" style="color: var(--blue);"></i> الْمَسَافَةُ: <strong id="total-km">0</strong> كَم</span>
        <span><i class="fas fa-landmark" style="color: var(--gold);"></i> الْمَحَطَّاتُ: <strong>31</strong></span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([28.5, 31.0], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-txt').innerText = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }
        setInterval(updateClock, 1000); updateClock();

        const locations = [
            { name: "رَفَحُ الْمِصْرِيَّةُ", coords: [31.2788, 34.2401], type: "تاريخي", cost: 100, icon: "fa-history", 
              desc_ar: "عَتَبَةُ الْأَمَانِ؛ طَبَعَ فِيهَا نُورُ الْعَالَمِ أُولَى خَطَوَاتِهِ فِي مِصْرَ مُعْلِنًا بَدْءَ عَصْرِ الْأَمَانِ.", 
              desc_en: "The Threshold of Safety; the first steps of Christ in Egypt, starting an era of peace.", 
              desc_cn: "安全的门槛；基督在埃及的第一步，开启了和平时代。" },
            { name: "الشَّيْخُ زُوَيْد", coords: [31.2131, 34.1106], type: "تاريخي", cost: 100, icon: "fa-history", 
              desc_ar: "شَجَرَةُ الْحَيَاةِ؛ اسْتَظَلَّ بِفَيْئِهَا الْكَلِمَةُ الْمُتَجَسِّدُ فَصَارَتْ رَمْزًا حَيًّا لِنُبُوءَةِ إِزْهَارِ الْقَفْرِ.", 
              desc_en: "The Tree of Life; where the Holy Family rested, a living symbol of the desert blooming.",

            { name: "الْعَرِيشُ", coords: [31.1306, 33.8038], type: "تاريخي", cost: 150, icon: "fa-history", 
              desc_ar: "وَاحَةُ الِارْتِوَاءِ؛ بَارَكَ فِيهَا يَنْبُوعُ الْحَيَاةِ بِئْرَ مَاءٍ لِتَرْتَوِيَ مِنْهَا الْعَائِلَةُ الْمِصْرِيَّةُ الضِّيَافَةِ.", 
              desc_en: "The Oasis of Refreshment; where the fountain of life blessed a well for the Family.", 
              desc_cn: "清新的绿洲；生命泉源为家人祝福的一口井。" },
            { name: "تَلُّ الْفَرَمَا", coords: [31.0423, 32.5568], type: "أثري", cost: 200, icon: "fa-landmark", 
              desc_ar: "بَوَّابَةُ الْمَجْدِ؛ شَهِدَتْ تَهَاوِيَ حُصُونِ الْوَثَنِيَّةِ أَمَامَ جَلَالِ حُضُورِ الْمُخَلِّصِ وَنِهَايَةِ تِيهِ سَيْنَاءَ.", 
              desc_en: "Gateway of Glory; witnessed the collapse of paganism before the Savior's presence.", 
              desc_cn: "荣耀之门；见证了救世主降临时异教的崩溃。" },

              desc_en: "The Presence Quake; stone idols bowed and a fresh spring gushed for the Creator.",

              desc_en: "Musturud; a holy spring blessed by Jesus' body when Mary washed Him in its well.",

            { name: "بِلْبِيس", coords: [30.4214, 31.5664], type: "تاريخي", cost: 80, icon: "fa-history", 
              desc_ar: "شَجَرَةُ الْحِمَايَةِ؛ انْحَنَتْ أَغْصَانُهَا لِتَكُونَ عَرْشًا يَسْتَظِلُّ بِهِ نُورُ الْعَالَمِ فِي بَرِّيَّةِ الشَّرْقِيَّةِ.", 
              desc_en: "Tree of Protection; its branches bowed to shade the Light of the World.", 
              desc_cn: "保护之树；它的枝条垂下，为世界之光遮荫。" },
            { name: "مِنْيَةُ سَمَنُّود", coords: [30.9567, 31.2515], type: "روحاني", cost: 120, icon: "fa-cross",

              desc_en: "Table of Blessing; a station that witnessed Egyptian hospitality for the Holy Family.",

              desc_en: "Church of St. Mary; contains the granite trough used by the Virgin Mary.", 
              desc_cn: "圣玛利亚教堂；藏有圣母玛利亚使用过的花岗岩槽。" },
            { name: "دَقَادُوس", coords: [30.7285, 31.2635], type: "روحاني", cost: 100, icon: "fa-church", 
              desc_ar: "يَنْبُوعُ النِّعْمَةِ؛ بِئْرُ الشِّفَاءِ الَّتِي تَقَدَّسَتْ بِظُهُورَاتِ أُمِّ النُّورِ لِتَكُونَ مَنَارَةً لِلْمُتْعَبِينَ.", 
              desc_en: "Fountain of Grace; a healing well sanctified by the apparitions of Mary.", 
              desc_cn: "恩宠之泉；由玛利亚显现而圣化的医治之井。" },
            { name: "دَيْرُ الْقِدِّيسَةِ دَمْيَانَة", coords: [31.2941, 31.3892], type: "روحاني", cost: 150, icon: "fa-church", 
              desc_ar: "حِصْنُ الْعَذَارَى؛ بَرَارِي شَهِدَتْ سِرَّ الرِّحْلَةِ الْمُقَدَّسَةِ وَنَبَعَتْ فِيهَا بِئْرٌ لِلْعَذْرَاءِ مَرْيَمَ.", 
              desc_en: "Fortress of Virgins; wilderness that witnessed the secret of the Holy Trip.",

            { name: "سَخَا", coords: [31.0890, 30.9477], type: "روحاني", cost: 100, icon: "fa-cross",

              desc_en: "Bikha Isous; a stone where Christ left His footprint, honoring Egypt's soil.",

            { name: "بَرِّيَّةُ شِيهِيت", coords: [30.3179, 30.3547], type: "روحاني", cost: 300, icon: "fa-church",

              desc_en: "Path of Light; a path blessed by the Family, later a site of heavenly apparitions.", 
              desc_cn: "光明之路；一个受家庭祝福的小路，后来成为天象显现的地点。" },
            { name: "وَسَطُ الْقَاهِرَةِ", coords: [30.0569, 31.2487], type: "تاريخي", cost: 150, icon: "fa-history",

        function speakAI(text, lang) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = lang === 'ar' ? 'ar-EG' : lang === 'en' ? 'en-US' : 'zh-CN';
            msg.rate = 0.85; // سرعة هادئة لنطق الحركات بوضوح
            window.speechSynthesis.speak(msg);
        }

        async function fetchWeather(lat, lon, elementId) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                document.getElementById(elementId).innerText = `${Math.round(data.current_weather.temperature)}°C`;
            } catch { document.getElementById(elementId).innerText = "--"; }
        }

        window.registerVisit = function(name, vId) {
            let label = document.getElementById(vId);
            label.innerText = parseInt(label.innerText) + 1;
            event.target.innerText = "تَمَّ الْوُصُولُ"; event.target.disabled = true;
        }

        locations.forEach((loc, index) => {
            const wId = `w-${index}`, vId = `v-${index}`;
            const markerIcon = L.divIcon({
                html: `<div class="map-icon-container"><i class="fas ${loc.icon}" style="color:var(--gold)"></i></div>`,
                className: '', iconSize: [35, 35]
            });

            L.marker(loc.coords, { icon: markerIcon }).addTo(map)
                .bindPopup(`
                    <div class="popup-card">
                        <img src="https://picsum.photos/id/${100+index}/300/150" class="popup-img">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <strong>${loc.name}</strong>
                            <span id="${wId}" style="color:var(--blue); font-size:12px;">..</span>
                        </div>
                        <div class="lang-tabs">
                            <button class="tab-btn active" onclick="speakAI('${loc.desc_ar}', 'ar')">AR</button>
                            <button class="tab-btn" onclick="speakAI('${loc.desc_en}', 'en')">EN</button>
                            <button class="tab-btn" onclick="speakAI('${loc.desc_cn}', 'cn')">CN</button>
                        </div>
                        <p style="font-size:11px;">${loc.desc_ar}</p>
                        <button class="ai-voice-btn" onclick="speakAI('${loc.desc_ar}', 'ar')"><i class="fas fa-microphone"></i> اسْتَمِعْ</button>
                        <div style="font-size:11px; margin-top:8px;">الزُّوَّارُ: <b id="${vId}">1540</b></div>
                        <button class="checkin-btn" onclick="registerVisit('${loc.name}', '${vId}')">تَسْجِيلُ وُصُولٍ</button>
                    </div>
                `).on('popupopen', () => fetchWeather(loc.coords[0], loc.coords[1], wId));
        });

        function planMyTrip() {
            const budget = parseFloat(document.getElementById('budget').value) || 0;
            const type = document.getElementById('type').value;
            let myPath = locations.filter(l => l.type === type && l.cost <= budget);
            document.getElementById('result-card').style.display = 'block';
            let list = ""; myPath.forEach((s, i) => list += `<div>${i+1}. ${s.name}</div>`);
            document.getElementById('route-summary').innerText = `وَجَدْنَا ${myPath.length} مَحَطَّةٍ`;
            document.getElementById('itinerary-list').innerHTML = list;
        }

        let totalM = 0; for(let i=0; i<locations.length-1; i++) totalM += map.distance(locations[i].coords, locations[i+1].coords);
        document.getElementById('total-km').innerText = Math.round(totalM/1000);
    </script>
